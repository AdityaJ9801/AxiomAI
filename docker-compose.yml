version: '3.9'

# ==============================================================
# AXIOM AI — Production Docker Compose
# Economic Analysis Platform with FastAPI + Next.js
# Ready for GitHub deployment and production use
# ==============================================================

services:
  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: axiom-ai/backend:latest
    container_name: axiom_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_DATASET_ROWS=${MAX_DATASET_ROWS:-1000000}
      - MAX_ANALYSIS_TIME=${MAX_ANALYSIS_TIME:-300}
      - WORKERS=${WORKERS:-2}
    volumes:
      # Persist uploaded datasets and reports
      - axiom_uploads:/app/uploads
      - axiom_reports:/app/exports
      - axiom_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - axiom_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: axiom-ai/frontend:latest
    container_name: axiom_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - axiom_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── Nginx Reverse Proxy (Optional for production) ──────────
  nginx:
    image: nginx:alpine
    container_name: axiom_nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - axiom_net
    restart: unless-stopped
    profiles:
      - production

# ── Volumes ────────────────────────────────────────────────────
volumes:
  axiom_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/uploads
  axiom_reports:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/reports
  axiom_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/logs

# ── Networks ───────────────────────────────────────────────────
networks:
  axiom_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
