version: '3.9'

# ==============================================================
# AXIOM AI — Production Docker Compose with Nginx
# Full production setup with reverse proxy, SSL, and monitoring
# ==============================================================

services:
  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: axiom-ai/backend:${VERSION:-latest}
    container_name: axiom_backend_prod
    environment:
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_DATASET_ROWS=${MAX_DATASET_ROWS:-1000000}
      - MAX_ANALYSIS_TIME=${MAX_ANALYSIS_TIME:-300}
      - WORKERS=${WORKERS:-4}
    volumes:
      - axiom_uploads:/app/uploads
      - axiom_reports:/app/exports
      - axiom_logs:/app/logs
    networks:
      - axiom_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    image: axiom-ai/frontend:${VERSION:-latest}
    container_name: axiom_frontend_prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - axiom_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: axiom_nginx_prod
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - axiom_static:/var/www/static
    depends_on:
      - frontend
      - backend
    networks:
      - axiom_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ── Redis Cache (Optional) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: axiom_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-axiom_redis_pass}
    volumes:
      - axiom_redis:/data
    networks:
      - axiom_net
    restart: unless-stopped
    profiles:
      - cache
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # ── Prometheus Monitoring (Optional) ────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: axiom_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - axiom_prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - axiom_net
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana Dashboard (Optional) ────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: axiom_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - axiom_grafana:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - axiom_net
    restart: unless-stopped
    profiles:
      - monitoring

# ── Volumes ────────────────────────────────────────────────────
volumes:
  axiom_uploads:
    driver: local
  axiom_reports:
    driver: local
  axiom_logs:
    driver: local
  axiom_static:
    driver: local
  axiom_redis:
    driver: local
  axiom_prometheus:
    driver: local
  axiom_grafana:
    driver: local

# ── Networks ───────────────────────────────────────────────────
networks:
  axiom_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16